<!DOCTYPE html>
<html ng-app = "fyp">
  <head>
      <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.7.1/css/all.css" integrity="sha384-fnmOCqbTlWIlj8LyTjo7mOUStjsKC4pOpQbqyi7RrhN7udi9RwhKkMHpvLbHG9Sr" crossorigin="anonymous">
      <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
    <link rel="stylesheet" href="css/index.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js" integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.5.0/css/all.css" integrity="sha384-B4dIYHKNBt8Bc12p+WXckhzcICo0wtJAoU8YZTY5qE0Id1GSseTk6S+L3BlXeVIU" crossorigin="anonymous">
    <script type="text/javascript" src="js/angular.min.js"></script>
    <script type="text/javascript"src="js/home.controller.js"></script>
  </head>
    <body ng-controller="homeCtrl">
      <div class="navigation">
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
          <a class="navbar-brand" href="#"> <i class="fas fa-hospital"></i> Clinical Pathways</a>
            <ul class="navbar-nav ml-auto">
              <li class="nav-item"><a class="nav-link" href="index.html"> Home </a></li>
              <li class="nav-item"><a class="nav-link" href=""> Pathways </a></li>
              <li class="nav-item"><a class="nav-link" href=""> About </a></li>
              <li class="nav-item"><a class="nav-link" href=""> Contact </a></li>
            </ul>
            <div class="col-sm-3 col-md-3">
              <form class="navbar-form" role="search">
              <div class="input-group">
                  <input type="text" class="form-control" placeholder="Search" name="q">
                  <div class="input-group-btn">
                      <button class="btn btn-primary" type="submit"><i class="fas fa-search"></i></button>
                  </div>
              </div>
              </form>
          </div>
        </nav>
      </div>
    <div id = "conditions">
      <table st-safe-src="objectDataArr[0]" st-table="" class="table table-striped">
        <thead>
        <tr>
          <th st-sort="conditions">Conditions</th>
        </tr>
        <tr>
            <th>
                <input st-search="conditions" placeholder="search for condition" class="form-control" type="text"/>
              </th>
              
        </tr>
        </thead>
        <tbody>
        <tr ng-repeat="condition in conditions">
          <td><a style="text-decoration:none" href ="{{condition | lowercase}}.html">{{condition}}</a></td>
        </tr>
        </tbody>
 </table>
      </div>
 
    </body>   
    </html>
