<html>

<head>
    <link rel="shortcut icon" type="image/x-icon" href="/images/favicon2.ico">

    <!-- Declarations for all the external scripts used in this file -->
    <script src="js/jquery-3.3.1.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.5.0/angular.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/angular-smart-table/2.1.8/smart-table.min.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.0.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Open+Sans" />
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.7.1/css/all.css" integrity="sha384-fnmOCqbTlWIlj8LyTjo7mOUStjsKC4pOpQbqyi7RrhN7udi9RwhKkMHpvLbHG9Sr" crossorigin="anonymous">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
    <!-- Declarations for all the custom scripts used in this file -->
    <script src="js/nav.js"></script>
    <script src="js/home.controller.js"></script>

</head>
<div class="navigation">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <a class="navbar-brand" href="index.html"> <i class="fas fa-hospital"></i> Clinical Pathways</a>
        <ul class="navbar-nav ml-auto">
            <li class="nav-item"><a class="nav-link" href="index.html"> Home </a></li>
            <li class="nav-item"><a class="nav-link" href="about.html"> About </a></li>
            <li class="nav-item">
                <a class="nav-link"> </a>
            </li>
        </ul>
    </nav>
  </div>
<body ng-app="App" ng-controller="testController" background="https://images.pexels.com/photos/1282308/pexels-photo-1282308.jpeg?auto=compress&cs=tinysrgb&dpr=2&h=650&w=940">

    <div class="card" style="width: 50%;margin-left: 25%;padding: 2%;background-color:rgba(255, 255, 255, 0.70);height: 90%;">

        <div class="container">
            <table st-table="display_records" st-safe-src="conditions" class="table table-hover table-light table-borderless">
                <thead class="thead-dark">
                    <tr>
                        <th>
                            <h1>Search for Condition</h1></th>

                    </tr>
                    <tr>
                        <th colspan="5">
                            <input st-search placeholder="Search..." class="input-sm form-control" type="search" />
                        </th>
                    </tr>
                </thead>
                <tbody>
                    <tr st-select-row="row" st-select-mode="multiple" ng-repeat="row in display_records">
                        <td style="text-align: center;"><a href={{row|lowercase}}.html style="text-decoration: none;color:rgb(1, 79, 81);">{{row}}</a></td>
                    </tr>
                </tbody>
                <tfoot>
                    <tr>
                        <td colspan="5" class="text-center" style="background:rgba(52, 58, 64, 0.25);">
                            <div st-pagination="" st-items-by-page="15" style="display:inline-block;"></div>
                        </td>
                    </tr>
                </tfoot>
            </table>
        </div>
    </div>
</body>

</html>
